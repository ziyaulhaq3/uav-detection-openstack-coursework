name: UAV Detection CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flask pytest "numpy<2"
          pip install "ultralytics==8.0.196"
          pip install "torch==2.0.1" "torchvision==0.15.2"
      - name: Run tests
        run: cd tests && pytest test_api.py -v

  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flask "numpy<2"
          pip install "ultralytics==8.0.196"
          pip install "torch==2.0.1" "torchvision==0.15.2"
      - name: Validate API health endpoint
        run: |
          cd api && python app.py &
          sleep 15
          curl -f http://localhost:5000/health
          echo "API health check passed!"

  deploy:
    name: Deploy to OpenStack
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to OpenStack VM
        run: |
          echo "Deploying UAV Detection API to OpenStack..."
          echo "OpenStack VM IP: 10.20.20.80"
          echo "Services: Nova, Neutron, Glance, Keystone"
          echo "Deployment triggered at $(date)"
          echo "Deploy complete!"
