name: UAV Detection CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flask pytest "numpy<2" ultralytics
      - name: Run tests
        run: cd tests && pytest test_api.py -v

  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r api/requirements.txt
      - name: Validate API
        run: |
          cd api && python app.py &
          sleep 10
          curl -f http://localhost:5000/health
          echo "API health check passed!"

  deploy:
    name: Deploy to OpenStack
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to OpenStack VM
        run: |
          echo "Deploying UAV Detection API to OpenStack..."
          echo "VM Floating IP: 10.20.20.80"
          echo "Deployment triggered at $(date)"
          echo "Deploy complete!"
